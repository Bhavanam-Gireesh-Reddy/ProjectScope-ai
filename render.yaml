services:
  - type: web
    name: projectscope-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: ELASTICSEARCH_HOST
        sync: false
      - key: ELASTICSEARCH_USER
        sync: false
      - key: ELASTICSEARCH_PASSWORD
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
