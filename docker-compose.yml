
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: projectscope_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - projectscope_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.16
    container_name: projectscope_neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - projectscope_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: projectscope_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - projectscope_network

  redis:
    image: redis:7-alpine
    container_name: projectscope_redis
    ports:
      - "6380:6379"
    networks:
      - projectscope_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectscope_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
    depends_on:
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - projectscope_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectscope_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - projectscope_network

volumes:
  es_data:
  neo4j_data:
  mongo_data:

networks:
  projectscope_network:
    driver: bridge
